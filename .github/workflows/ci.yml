name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y luacheck
      - name: Lint Lua scripts
        run: |
          luacheck scripts/ \
            --globals freeswitch session argv \
            --no-unused-args \
            --no-max-line-length

  validate-xml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Validate dialplan XML well-formedness
        run: find conf -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout
